3日10时50分，我国在太原卫星发射中心成功将银河航天灵犀03星发射升空。该星由银河航天自主研制，是我国首款使用柔性太阳翼的卫星，主要功能为低轨道宽带通信，这也是我国首次在轨对多星堆叠发射技术进行验证，将为我国巨型低轨通信星座的快速部署提供技术支撑。"},"76":{"title":"银河航天研制的InSAR卫星发射","digest":"北京时间2023年3月30日18时50分，我国在太原卫星发射中心成功将银河航天承担研制的四颗干涉合成孔径雷达（InSAR）卫星发射升空。这是国际上首个四星编队飞行的X波段InSAR对地成像系统，该组卫星在轨构成国际上首个车轮式卫星编队。"},"77":{"title":"银河航天02批卫星发射","digest":"北京时间2022年3月5日14时01分，我国首次批量研制6颗低轨宽带通信卫星——银河航天02批卫星在西昌卫星发射中心成功发射，验证了我国具备建设卫星互联网巨型星座所必须的卫星低成本、批量研制以及组网运营能力。"},"78":{"title":"银河航天首发星发射","digest":"北京时间2020年1月16日11时02分，我国首颗通信总容量达48Gbps的低轨宽带通信卫星——银河航天首发星在酒泉卫星发射中心成功发射，在国际上第一次验证了Q/V/Ka频段通信。"},"79":{"title":"银河航天承担研制的卫星互联网技术试验卫星发射成功","digest":"2024年11月30日，我国首个商业航天发射场海南商业航天发射场首次发射取得圆满成功。新型运载火箭长征十二号成功将卫星互联网技术试验卫星送入预定轨道。卫星互联网技术试验星由银河航天承担研制。"},"2584":{"title":"银河航天承担研制的卫星互联网低轨07组卫星成功发射","digest":"北京时间2025年8月4日18时21分，我国在海南商业航天发射场使用长征十二号运载火箭，成功将卫星互联网低轨07组卫星发射升空，卫星顺利进入预定轨道，发射任务获得圆满成功。本次发射的一组卫星，均由银河航天承担研制，这是民营商业航天公司首次批量研制此类卫星。"},"25916":{"title":"银河航天承担研制的卫星互联网技术试验卫星成功发射","digest":"北京时间2025年9月16日9时6分，我国在酒泉卫星发射中心，成功将卫星互联网技术试验卫星发射升空，卫星顺利进入预定轨道，发射任务获得圆满成功。本次任务中的一颗卫星互联网技术试验卫星，由商业航天公司银河航天承担研制。"},"26119":{"title":"银河航天承担研制的卫星互联网低轨19组卫星成功发射","digest":"北京时间2026年1月19日15时48分，我国在海南商业航天发射场使用长征十二号运载火箭，成功将卫星互联网低轨19组卫星发射升空，卫星顺利进入预定轨道，发射任务获得圆满成功。该组卫星是银河航天持续独立承担此类太空基础设施建设研制的第二组卫星。"},"260424":{"title":"银河航天承担研制的卫星互联网技术试验卫星成功发射","digest":"北京时间2026年4月24日14时35分，我国在西昌卫星发射中心使用长征二号丁运载火箭，成功将卫星互联网技术试验卫星发射升空，卫星顺利进入预定轨道，发射任务取得圆满成功。该卫星主要用于开展手机宽带直连卫星、天地网络融合等技术试验验证。本次任务中的一颗卫星，由银河航天承担研制，银河航天持续助力太空基础设施建设。"},"260611":{"title":"银河航天承担研制的手机直连卫星成功发射","digest":"北京时间2026年6月9日16时23分，银河航天承担研制的中国移动02星成功发射，任务取得圆满成功。这颗卫星将用于开展手机直连卫星、天地网络融合等技术试验验证。银河航天持续助力太空新基建。"}},"address":"地址","applications":{"title":"卫星互联网应用","more":"了解更多"},"devices":{"title":"单机与部件","more":"了解更多"},"newsCenter":{"title":"新闻中心","more":"了解更多"},"honor":{"title":"荣誉奖项","more":"了解更多"},"satelliteSeries":{"title":"卫星系列","more":"查看更多"},"partners":{"title":"合作伙伴","more":"了解更多"}},"footer":{"companyName":"银河航天","address":"地\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;址：北京市经济技术开发区信创园一期5号楼9-11层","phone":"电\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;话：(+86) 010-62957077","fax":"传\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;真：(+86) 010-82731600","businessCooperation":"商务合作：(+86) 010-68428330","businessEmail":"\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;bd@yinhe.ht","governmentCooperation":"政府合作：gr@yinhe.ht","mediaCooperation":"媒体合作：pr@yinhe.ht","orbitalCoordination":"轨道协调：flight.control.team@yinhe.ht","aboutUs":"关于银河航天","companyIntro":"公司介绍","joinUs":"加入我们","friendlyLinks":"友情链接","wechatAccount":"银河航天微信公众号","wechatVideo":"银河航天微信视频号","spaceChina":"中国航天科技集团公司","casic":"中国航天科工集团公司","cetc":"中国电子科技集团公司"},"contactUs":{"address":"地\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;址：北京市经济技术开发区信创园一期5号楼9-11层","phone":"电\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;话：(+86) 010-62957077","fax":"传\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;真：(+86) 010-82731600","businessCooperation":"商务合作：(+86) 010-68428330","businessEmail":"\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;bd@yinhe.ht","governmentCooperation":"政府合作：gr@yinhe.ht","mediaCooperation":"媒体合作：pr@yinhe.ht","orbitalCoordination":"轨道协调：flight.control.team@yinhe.ht"},"about":{"title":"关于我们","intro":{"paragraph1":"银河航天是我国领先的卫星互联网解决方案提供商和卫星制造商，是我国商业航天领域第一家独角兽公司，于2018年4月正式投入运营。","paragraph2":"银河航天拥有一流的技术研发团队，深度融合航天与互联网基因，致力于通过敏捷开发、快速迭代模式，规模化研制各类低成本、高性能卫星。","paragraph3":"截至2026年6月9日，银河航天已成功发射了自主研制的40余颗技术先进的卫星，包括全球首颗高频低轨毫米波卫星、我国首次批量研制的低轨宽带通信卫星、我国首颗使用柔性太阳翼的平板可堆叠卫星、批量研制的SAR（合成孔径雷达）卫星、中高层大气临边探测遥感卫星等。","paragraph4":"作为新势力造星的领军企业，银河航天已建设新一代卫星智能制造工厂，形成百颗卫星的低成本批产能力，可全面满足卫星宽带通信、SAR、导航增强、频谱感知、光学遥感等不同领域的需求。同时，公司具备微波通信载荷、相控阵天线、数字处理载荷等先进载荷产品，以及综合电子、能源、测控等核心平台产品的低成本、批量研制能力，并已成功研制出全球首款大规模卷式全柔性太阳翼。","paragraph5":"目前，基于国内领先技术，低成本、批量化制造能力和良好的商业口碑，银河航天先后获得了多家合作伙伴的卫星产品订单。","paragraph6":"在开展卫星组网应用方面，公司已经构建了我国首个低轨宽带通信试验星座“小蜘蛛网”，完成了多项全球和国内首创的卫星互联网应用验证，并成功在海外落地应用，实现了中国卫星互联网首次出海。未来，银河航天将为卫星互联网建设、5G、6G产业发展以及消除互联网数字鸿沟贡献出自己的力量，履行发展航天科技服务人类社会的伟大使命。","paragraph7":""},"ceo":{"name":"徐 鸣","title":"连续创业者，银河航天创始人、董事长兼CEO","education":"毕业于哈尔滨工业大学","positions":{"1":"北京市政协委员","2":"北京市工商联执委","3":"北京市海淀区工商联副主席","4":"中国测绘学会对地观测工作委员会副主任委员","5":"北京市科技进步一等奖"}}},"rdc":{"summary":"为了满足卫星低成本批量制造的需要，银河航天在全国布局了2个整星和3个单机研制基地，按照\"单星研制先行验证，批产模式迭代优化\"推进低成本批产能力建设。","centers":{"beijing":{"title":"北京研发中心","address":"北京市经济技术开发区信创园一期5号楼9-11层","intro":"银河航天北京研发中心，致力于通过敏捷开发、快速迭代模式，规模化研制低成本、高性能的低轨宽带通信卫星平台研发，已逐步形成较为完善的卫星平台型谱，包括可堆叠平板卫星平台 、200-700kg级通信卫星平台、100-500kg遥感卫星平台、10-50kg灵巧型卫星平台等，可全面满足卫星宽带通信、光学遥感、SAR、导航增强、频谱感知等不同领域的应用需求。"},"xian":{"title":"西安研发中心","address":"陕西省西安市国家民用航天产业基地东长安街420号陕铁大厦10层","intro":"银河航天西安研发中心，致力于通信卫星载荷及毫米波产品的研发，主要负责卫星有效载荷、星载天线的研制、批量化生产。研发中心配套产线建设有十万级净化区、暗室测试区、热真空测试区、能源动力区、库房等区域，拥有先进的载荷AIT（总装、集成和测试）设备，各项生产技术水平在国内民营航天企业中处于领先水平。"},"chengdu":{"title":"成都研发中心","address":"四川省成都市高新区天勤路277号","intro":"银河航天成都研发中心，致力于毫米波微波系统、单机研发，并构建了微波产品、系统批量生产线。微波系统覆盖通信、遥控、遥测系统，微波雷达系统，可提供毫米波相控阵通信终端、毫米波相控阵天线、微波模块等产品，产品频率覆盖达到60GHz。研发中心配套产线目前具备12颗低轨宽带通信卫星载荷配套能力，正在建设二期产线5000平米，包括了自动微组装线、手动微组装线、整机集成线、系统联调区、产品环境试验区、微波暗室测试区等，具备年产300套毫米波相控阵终端、100颗低轨宽带通信卫星载荷生产能力。"},"nantong":{"title":"南通盘古工厂","address":"江苏省南通市开发区常兴路20号","intro":"南通盘古工厂是银河航天的卫星智能生产产线，致力于实现卫星总装集成、环境试验、综合测试以及配套单机的高效批产，厂房建筑面积约1.5万平方米，包括整星区约5000平方米、配套单机区约5000平方米及生产辅房约5000平方米。产线建设采用脉动式站位式生产布局，引入了装配机器人、自动化精测系统、数字化制造系统等先进装备，将具备年产百颗卫星的能力。"},"hefei":{"title":"合肥载荷中心","address":"安徽省合肥市高新区中安创谷三期N9栋","intro":"银河航天合肥载荷中心，位于合肥高新区，是国内领先的卫星通信载荷智能制造基地，具备覆盖载荷研发、智能制造、星地一体测试验证的全链条核心技术实力。中心首套通信卫星载荷已成功下线，智能产线正式投产，一期建成后可实现年产50—100颗卫星所需通信载荷的产能。"}}},"address":"地址","products":{"satellite":"卫星系列","devices":"单机与部组件","applications":"卫星互联网应用"},"productDetail":{"backToList":"返回列表"},"newsModal":{"sourceLabel":"来源","prev":"上一篇","next":"下一篇"}}},"__N_SSG":true},"page":"/about","query":{},"buildId":"rZFVaIQiJXNLjwTeeqZm0","isFallback":false,"gsp":true,"locale":"zh","locales":["zh","en"],"defaultLocale":"zh","scriptLoader":[]}</script></body></html>
