\u003cbr\u003e\u003c/p\u003e","sort":570,"creator":"123","online":1,"onhome":1,"isDelete":0,"createdTime":"2024-02-19T11:26:19","modifyTime":"2024-02-19T11:26:19","createdTimeStr":"2024-02-19 11:26:19","sorted":null,"lastId":null,"lastTitle":null,"lastSubtitle":null,"nextId":null,"nextTitle":null,"nextSubtitle":null},{"id":203,"title":"银河航天128波束ASIC化星载相控阵亮相MWC上海","subtitle":"","type":1,"source":"银河航天","showTime":"2026-06-24","digest":"2026年6月24日，2026上海世界移动通信大会（MWC26上海）开幕。作为亚洲地区通信与科技行业的顶级盛会，MWC26上海大会汇聚了全球通信产业的领军企业与行业专家，共同探讨前沿技术成果与产业发展","pic":"/news/202607/01/4b410486-0dd0-4cdc-ba81-8afe8755881a.png","content":"\u003cp\u003e\u003cspan style=\"font-size: medium; font-family: 微软雅黑; color: rgb(0, 0, 0);\"\u003e2026年6月24日-26日，2026上海世界移动通信大会（MWC26上海）在上海召开。作为我国领先的商业卫星集团公司，银河航天携核心载荷、卫星模型等多项创新成果亮相该展区。\u003cbr\u003e \u003cbr\u003e\u003cdiv style=\"text-align: center;\"\u003e\u003cimg src=\"/download/news/202607/01/984e4a17-a23e-435c-b743-c3eed6f7e804.png\" style=\"max-width:100%;\"\u003e\u003c/div\u003e\u003c/span\u003e\u003cspan style=\"font-size: medium; font-family: 微软雅黑; color: rgb(0, 0, 0);\"\u003e\u003cdiv style=\"text-align: center;\"\u003e图：银河航天在2026上海世界移动通信大会的展位\u003c/div\u003e\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cdiv style=\"text-align: center;\"\u003e\u003cspan style=\"color: rgb(0, 0, 0); font-family: 微软雅黑; font-size: medium;\"\u003e\u003cbr\u003e\u003c/span\u003e\u003c/div\u003e\u003cspan style=\"font-size: medium; font-family: 微软雅黑; color: rgb(0, 0, 0);\"\u003e当前，6G正加速从愿景走向现实。构建空天地一体化的泛在通信网络已成为行业共识，卫星互联网是实现这一目标的关键，而手机直连卫星则是重要支撑。\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"font-size: medium; font-family: 微软雅黑; color: rgb(0, 0, 0);\"\u003e\u003cbr\u003e聚焦这一前沿方向，银河航天在本次大会上首次公开展示了自研的第二代手机直连相控阵天线。这款产品是国内首款支持128波束的ASIC化星载相控阵，支持L和S双频段；得益于采用低压GaN射频前端及低功耗收发芯片，整阵功耗较上一代降低20%。\u003cbr\u003e \u003cbr\u003e\u003cdiv style=\"text-align: center;\"\u003e\u003cimg src=\"/download/news/202607/01/56272601-6ea4-4f6d-8016-d0416d597eee.png\" style=\"color: rgb(51, 51, 51); font-size: 14px; font-family: SourceHanSansCN-Medium, SourceHanSansCN; max-width: 100%;\"\u003e\u003c/div\u003e\u003c/span\u003e\u003cspan style=\"font-size: medium; font-family: 微软雅黑; color: rgb(0, 0, 0);\"\u003e\u003cdiv style=\"text-align: center;\"\u003e图：银河航天自主研制的手机直连相控阵天线\u003c/div\u003e\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"font-size: medium; font-family: 微软雅黑; color: rgb(0, 0, 0);\"\u003e\u003cbr\u003e据了解，相控阵天线是卫星互联网建设的关键核心技术，在手机直连卫星通信中发挥着至关重要的作用。由于普通手机终端发射功率有限，信号传送数百公里后到达卫星时已极其微弱，想要让用户在不更换手机的情况下，建立起稳定、可靠的星地通信链路，需要依靠大型相控阵天线对信号进行增强。\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"font-size: medium; font-family: 微软雅黑; color: rgb(0, 0, 0);\"\u003e\u003cbr\u003e随着卫星互联网建设的推进，星载相控阵天线正朝着“轻量化+多波束+大带宽+低功耗+智能化+低成本+高可靠性”的方向持续演进。目前，银河航天已完成两代全数字相控阵天线产品迭代，在轻量化、低功耗等方面实现了突破。\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"font-size: medium; font-family: 微软雅黑; color: rgb(0, 0, 0);\"\u003e\u003cbr\u003e面向未来，银河航天将持续发挥商业航天优势，在手机直连、星上大能源、超大容量数字处理与运算载荷等领域加大投入、开展技术攻关，持续提升卫星批产能力，抢抓6G时代发展机遇。\u003c/span\u003e\u003cbr\u003e\u003c/p\u003e","sort":500,"creator":"123","online":1,"onhome":1,"isDelete":0,"createdTime":"2026-07-01T17:01:42","modifyTime":"2026-07-01T17:01:42","createdTimeStr":"2026-07-01 17:01:42","sorted":null,"lastId":null,"lastTitle":null,"lastSubtitle":null,"nextId":null,"nextTitle":null,"nextSubtitle":null},{"id":202,"title":"低轨卫星通信载荷技术持续迭代　智能化成未来演进趋势","subtitle":"","type":1,"source":"人民邮电报","showTime":"2026-06-16","digest":"人民邮电报专访银河航天联合创始人、CTO朱正贤","pic":"/news/202606/16/4c3f9d78-fb30-4bae-b0da-4e2c57d1ec7d.jpg","content":"\u003cp\u003e\u003cspan style=\"font-size: medium;\"\u003e\u003cspan style=\"color: rgb(0, 0, 0); font-family: Arial;\"\u003e当前，6G技术研发稳步推进，空天地一体化网络体系逐步成型，低轨卫星互联网已然成为通信领域布局6G时代的核心方向之一。作为卫星系统的关键载荷，通信载荷的技术水平直接影响着卫星的通信质量、传输带宽与应用边界，其技术迭代走向也深刻影响着整个卫星通信产业的发展格局。\u003c/span\u003e\u003cbr\u003e\u003cbr\u003e\u003cspan style=\"color: rgb(0, 0, 0); font-family: Arial;\"\u003e当前，我国低轨卫星通信载荷技术现状如何，未来还需要在哪些方面进行集中攻关？带着这些问题，《人民邮电》报记者专访了银河航天联合创始人、CTO朱正贤。\u003c/span\u003e\u003cbr\u003e\u003cbr\u003e\u003c/span\u003e\u003cdiv style=\"color: rgb(0, 0, 0); font-family: Arial; text-align: center;\"\u003e\u003cspan style=\"font-weight: bold; font-size: medium;\"\u003e低轨卫星通信载荷技术趋近地面通信水平\u003c/span\u003e\u003c/div\u003e\u003cdiv style=\"text-align: center;\"\u003e\u003cspan style=\"color: rgb(0, 0, 0); font-family: Arial; font-size: medium;\"\u003e\u003cbr\u003e\u003c/span\u003e\u003c/div\u003e\u003cspan style=\"font-size: medium;\"\u003e\u003cspan style=\"color: rgb(0, 0, 0); font-family: Arial;\"\u003e放眼全球，低轨卫星星座组网竞争已进入白热化阶段。通信天线作为卫星的核心载荷之一，对卫星通信的质量与带宽将产生直接影响。朱正贤表示，持续推动天线技术创新与突破，是实现先进卫星天线批量生产、加速卫星互联网部署的关键所在。\u003c/span\u003e\u003cbr\u003e\u003cbr\u003e\u003cspan style=\"color: rgb(0, 0, 0); font-family: Arial;\"\u003e从技术演进逻辑来看，全球卫星通信载荷的性能升级主要围绕天线与信号处理能力两大核心维度展开。目前，行业内通信天线普遍朝着大口径、多波束的方向发展，以此提升卫星信号覆盖面与数据传输能力。“卫星通信载荷技术的提升是一项系统工程。”朱正贤说。为匹配天线技术升级需求，载荷产品需要不断提升集成度和效率，并同步推进整体结构的轻量化。而这些优化措施，还依托于芯片技术迭代，以及结构材料、散热能力等整阵集成技术的迭代突破。\u003c/span\u003e\u003cbr\u003e\u003cbr\u003e\u003cimg src=\"/download/news/202606/16/2f63c7e1-5cfa-4647-a2e2-c63389e98cd4.jpg\" style=\"max-width:100%;\"\u003e\u003cbr\u003e\u003c/span\u003e\u003cdiv style=\"text-align: center;\"\u003e\u003cspan style=\"font-weight: bold; font-size: small;\"\u003e\u003cspan leaf=\"\" style=\"\"\u003e\u003cspan text=\"\" style=\"\"\u003e图：银河航天自研的\u003c/span\u003e\u003c/span\u003e\u003cspan leaf=\"\" style=\"\"\u003e\u003cspan text=\"\" style=\"\"\u003e全球首颗Q/V毫米波低轨通信卫星\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003c/div\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"font-size: medium;\"\u003e\u003cspan style=\"color: rgb(0, 0, 0); font-family: Arial;\"\u003e谈及我国低轨卫星通信载荷技术的整体发展情况，朱正贤给出了清晰的判断：国内卫星通信载荷技术发展水平已趋近地面移动通信系统，与5G技术发展节奏同步，更是6G的“先锋队”。“在宽带传输、手机直连等主流应用场景中，卫星通信的容量、使用便捷性已和地面移动通信基本持平，二者的底层架构、硬件设施基本一致。”\u003c/span\u003e\u003cbr\u003e\u003cbr\u003e\u003cspan style=\"color: rgb(0, 0, 0); font-family: Arial;\"\u003e顺应6G空天地一体化网络的发展趋势，卫星通信技术更加注重“通、导、感、算”的融合。朱正贤表示，相较于高轨卫星，低轨卫星具有时延小、路径损耗小等优势，而手机直连低轨卫星将成为6G时代天基卫星通信网络的新亮点和必备能力之一。\u003c/span\u003e\u003cbr\u003e\u003cbr\u003e\u003cspan style=\"color: rgb(0, 0, 0); font-family: Arial;\"\u003e未来，低轨卫星通信载荷以及相关技术的持续迭代升级，还将支撑太空算力等新兴需求落地。\u003c/span\u003e\u003cbr\u003e\u003cbr\u003e\u003c/span\u003e\u003cdiv style=\"text-align: center;\"\u003e\u003cspan style=\"font-family: Arial; color: rgb(0, 0, 0); font-weight: bold; font-size: medium;\"\u003e相控阵天线技术支撑手机直连卫星场景落地\u003c/span\u003e\u003c/div\u003e\u003cdiv style=\"text-align: center;\"\u003e\u003cspan style=\"font-size: medium;\"\u003e\u003cbr\u003e\u003c/span\u003e\u003c/div\u003e\u003cspan style=\"font-size: medium;\"\u003e\u003cspan style=\"color: rgb(0, 0, 0); font-family: Arial;\"\u003e相控阵天线技术是卫星互联网建设的关键要素，其批量研制能有效提升卫星互联网星座整体通信能力，加速卫星互联网建设进程。朱正贤表示，从行业发展趋势来看，相控阵天线正朝着“高集成+多波束+大带宽+低功耗+智能化+低成本+高可靠性”的方向演进。\u003c/span\u003e\u003cbr\u003e\u003cbr\u003e\u003cspan style=\"color: rgb(0, 0, 0); font-family: Arial;\"\u003e手机直连卫星场景离不开相控阵天线技术的支撑。由于普通手机终端发射功率、信号接收能力较弱，想要实现稳定的手机直连卫星通信，就需要数十平方米级别的大型相控阵天线弥补性能差距。在相控阵天线技术方面，目前银河航天已完成25平方米级产品全信息流数字化技术的应用，并在载荷轻量化方面取得显著进展，重量已降至25公斤／平方米，降幅近30％。除此之外，在功耗控制方面，依托发射功放TR组件、数字处理专用ASIC等技术迭代，同等工况下整体功耗降幅可达30％。\u003c/span\u003e\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"font-size: medium;\"\u003e\u003cimg src=\"/download/news/202606/16/cbf094f5-add3-4100-aa7f-6f14f0f01c2c.jpg\" style=\"max-width:100%;\"\u003e\u003cspan style=\"color: rgb(0, 0, 0); font-family: Arial;\"\u003e\u003c/span\u003e\u003c/span\u003e\u003c/p\u003e\u003cp style=\"text-align: center;\"\u003e\u003cspan style=\"font-weight: bold; font-size: small;\"\u003e\u003cspan leaf=\"\" style=\"\"\u003e\u003cspan text=\"\" style=\"\"\u003e图：\u003c/span\u003e\u003c/span\u003e\u003cspan leaf=\"\" style=\"\"\u003e\u003cspan text=\"\"\u003e国内首颗使用柔性太阳翼的平板可堆叠卫星\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"font-size: medium;\"\u003e\u003cspan style=\"color: rgb(0, 0, 0); font-family: Arial;\"\u003e面对国内低轨卫星星座批量发射、在轨部署的现实需求，6G底层技术发展正从传统的通用化、标准化加速向智能化发展。因此，未来卫星通信载荷向智能化方向演进已是必然趋势，并且需要根据市场需求持续适配技术升级。朱正贤进一步解释，技术智能化的特点能够更好地适应多品种、小批量的产品生产，即便产品型号多样、接口不同，也能更好地支撑产品快速迭代。与此同时，软件智能设计、人工智能技术的普及，也在重塑包括卫星载荷研发在内的整个高端制造体系。朱正贤透露，除了智能化外，未来卫星通信载荷的研发重心还将更多集中在轻量化、低成本、批量化生产上。\u003c/span\u003e\u003cbr\u003e\u003cbr\u003e\u003c/span\u003e\u003cdiv style=\"text-align: center;\"\u003e\u003cspan style=\"color: rgb(0, 0, 0); font-family: Arial; font-weight: bold; font-size: medium;\"\u003e加速构建新型商业航天产业生态\u003c/span\u003e\u003c/div\u003e\u003cdiv style=\"text-align: center;\"\u003e\u003cspan style=\"font-size: medium;\"\u003e\u003cbr\u003e\u003c/span\u003e\u003c/div\u003e\u003cspan style=\"color: rgb(0, 0, 0); font-family: Arial; font-size: medium;\"\u003e如今，全球低轨卫星通信载荷技术竞赛已全面开启。如何推动国内低轨卫星通信载荷技术持续迭代？朱正贤认为，国内商业航天领域要充分整合各类企业资源，依托本土完整的工业基础体系，推动整个商业航天供应链开放，并通过不断融合地面工业制造体系，加速构建新型商业航天产业生态。\u003c/span\u003e\u003c/p\u003e\u003cp style=\"text-align: center;\"\u003e\u003cspan style=\"font-size: medium;\"\u003e\u003cimg src=\"/download/news/202606/16/e3419d1a-88d5-4ddd-9130-3393b4538ced.jpg\" style=\"max-width:100%;\"\u003e\u003c/span\u003e\u003cspan style=\"font-weight: bold; font-size: small;\"\u003e\u003cspan leaf=\"\" style=\"\"\u003e\u003cspan text=\"\" style=\"\"\u003e图：\u003c/span\u003e\u003c/span\u003e\u003cspan leaf=\"\" style=\"\"\u003e\u003cspan text=\"\" style=\"\"\u003e国内首颗使用柔性太阳翼的平板可堆叠卫星\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"font-size: medium; color: rgb(0, 0, 0); font-family: Arial;\"\u003e\u003cbr\u003e\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"font-size: medium;\"\u003e\u003cspan style=\"color: rgb(0, 0, 0); font-family: Arial;\"\u003e从技术演进的角度来看，未来卫星通信载荷技术攻关的重点领域除大尺寸天线外，还包括在轨的展开技术、散热技术以及通信载荷处理能力等，这对芯片的集成度与运算性能提出了更高要求。“目前主流波束赋形芯片支持8、16、32波束，长远来看，需要芯片具备更高集成度，具备128乃至数百路波束的处理能力。”朱正贤说。\u003c/span\u003e\u003cbr\u003e\u003cbr\u003e\u003c/span\u003e\u003cdiv style=\"text-align: left;\"\u003e\u003cspan style=\"color: rgb(0, 0, 0); font-family: Arial; font-size: medium;\"\u003e值得关注的是，卫星技术的不断进阶，也在反向牵引芯片、射频器件等产业加速迭代升级，形成“技术带动制造、制造反哺产业发展”的良性循环。\u003c/span\u003e\u003c/div\u003e\u003c/p\u003e","sort":490,"creator":"123","online":1,"onhome":1,"isDelete":0,"createdTime":"2026-06-16T15:45:20","modifyTime":"2026-06-16T15:45:20","createdTimeStr":"2026-06-16 15:45:20","sorted":null,"lastId":null,"lastTitle":null,"lastSubtitle":null,"nextId":null,"nextTitle":null,"nextSubtitle":null},{"id":200,"title":"银河航天承担研制的手机直连卫星成功发射","subtitle":"","type":1,"source":"银河航天","showTime":"2026-06-09","digest":"北京时间2026年6月9日16时23分，银河航天承担研制的中国移动02星成功发射，任务取得圆满成功。这颗卫星将用于开展手机直连卫星、天地网络融合等技术试验验证。银河航天持续助力太空新基建。","pic":"/news/202606/16/1d907c94-a425-4021-a9a5-ae6a261cacce.jpg","content":"\u003cp\u003e\u003cspan style=\"font-size: medium; font-family: 微软雅黑;\"\u003e北京\u003cspan style=\"color: rgb(0, 0, 0);\"\u003e时间2026年6月9日16时23分，银河航天承担研制的中国移动02星成功发射，任务取得圆满成功。这颗卫星将用于开展手机直连卫星、天地网络融合等技术试验验证。银河航天持续助力太空新基建。\u003c/span\u003e\u003cbr\u003e\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cimg src=\"/download/news/202606/16/a0d054e2-b27d-4732-808a-9e5d7236ae51.jpg\" style=\"max-width:100%;\"\u003e\u003c/p\u003e","sort":480,"creator":"123","online":1,"onhome":1,"isDelete":0,"createdTime":"2026-06-16T11:45:29","modifyTime":"2026-06-16T11:45:29","createdTimeStr":"2026-06-16 11:45:29","sorted":null,"lastId":null,"lastTitle":null,"lastSubtitle":null,"nextId":null,"nextTitle":null,"nextSubtitle":null}],"satellites":[],"devices":[{"id":22,"title":"Q/V频段馈电天线","subtitle":"Q/V频段馈电天线","type":2,"digest":"银河航天自主研发的Q/V馈电天线为双轴机械可动宽带双圆极化环焦天线，用于低轨宽带卫星馈电信号的收发，14副天线在轨飞行，产品已演进到银河航天第三代Q/V天线。","pic":"/product/202301/10/d1445bf5-be6f-425b-a7aa-152e271194e0.png","homepic":"/product/202210/09/b51d36e5-78a8-4e04-80e2-ae9506317298.jpg","sort":200,"creator":"123","online":1,"onhome":1,"isDelete":0,"createdTime":"2022-09-22T11:44:41","modifyTime":"2022-09-22T11:44:41","createdTimeStr":"2022-09-22 11:44:4 pic":"/product/202507/31/a4434c53-942c-47a6-ae20-f52ee65781f1.jpg","homepic":null,"sort":930,"creator":"123","online":1,"onhome":1,"isDelete":0,"createdTime":"2025-07-30T14:16:14","modifyTime":"2025-07-30T14:16:14","createdTimeStr":"2025-07-30 14:16:14","productIntroduceChildsList":null},{"id":171,"title":"银河航天完成基于卫星互联网的无人机灭火应用试验","subtitle":"银河航天完成基于卫星互联网的无人机灭火应用试验","type":3,"digest":"2025年12月，银河航天完成了基于卫星互联网进行的无人机灭火应用试验。在本次试验中，一架50公斤级无人机在成都某试验场地通过低轨卫星网络建立通信链路后顺利升空，远在北京的技术人员通过卫星信号在屏幕上实时接收到清晰的监测画面。模拟火情发生后，无人机第一时间飞往现场，利用低轨卫星网络的高带宽、低时延优势，将火情现场的高清实时画面回传至远程指挥中心。","pic":"/product/202605/08/3a649be3-cc16-438a-a57d-f3927ed2b97d.jpg","homepic":null,"sort":921,"creator":"123","online":1,"onhome":1,"isDelete":0,"createdTime":"2026-05-08T15:04:10","modifyTime":"2026-05-08T15:04:10","createdTimeStr":"2026-05-08 15:04:10","productIntroduceChildsList":null},{"id":170,"title":"银河航天完成低轨卫星互联网与具身智能人形机器人的联网测试","subtitle":"银河航天完成低轨卫星互联网与具身智能人形机器人的联网测试","type":3,"digest":"2026年1月，银河航天完成低轨卫星互联网与具身智能人形机器人的联网测试，实现低轨高通量卫星联网同步传输机器人视觉数据。这是全球首次具身智能人形机器人连接低轨卫星的成功试验，验证了机器人在无地面网络支撑下的稳定作业能力，标志着我国空天地一体化通信应用迈入新阶段。","pic":"/product/202605/08/a6b84be1-964d-431e-8f94-57aa76a5963e.jpg","homepic":null,"sort":920,"creator":"123","online":1,"onhome":1,"isDelete":0,"createdTime":"2026-05-08T14:59:18","modifyTime":"2026-05-08T14:59:18","createdTimeStr":"2026-05-08 14:59:18","productIntroduceChildsList":null},{"id":162,"title":"银河航天“小蜘蛛网 落地泰国进行应用演示","subtitle":"银河航天“小蜘蛛网 落地泰国进行应用演示","type":3,"digest":"2024年6月，银河航天与泰国马汉科理工大学联合主办的卫星互联网合作主题研讨会在曼谷举行。在研讨会现场，双方工作人员进行了卫星互联网应用场景的实时演示。","pic":"/product/202507/31/3de4a34d-f443-4206-b34d-2de734193295.jpg","homepic":null,"sort":908,"creator":"123","online":1,"onhome":1,"isDelete":0,"createdTime":"2025-07-30T17:01:09","modifyTime":"2025-07-30T17:01:09","createdTimeStr":"2025-07-30 17:01:09","productIntroduceChildsList":null},{"id":163,"title":"银河航天与PCCW在香港成功完成低轨卫星测试","subtitle":"银河航天与PCCW在香港成功完成低轨卫星测试","type":3,"digest":"2025年年初，内地私营商业航天领军企业银河航天在香港电讯旗下国际电讯服务供应商PCCW Global的支持下建设首个位于香港的低轨宽带卫星通信演示站。双方随后完成将演示站连接至银河航天由八颗低轨通信卫星组成的试验星座“小蜘蛛网”的测试，将高速、低时延的卫星网络应用于远程高清影片传输、自动驾驶车辆远程控制等不同场景，以验证低轨卫星通信技术的可行性和商业潜力。","pic":"/product/202507/31/222ceec5-c9e6-47c2-99bd-95e69ddb4977.jpg","homepic":null,"sort":906,"creator":"123","online":1,"onhome":1,"isDelete":0,"createdTime":"2025-07-30T17:08:14","modifyTime":"2025-07-30T17:08:14","createdTimeStr":"2025-07-30 17:08:14","productIntroduceChildsList":null},{"id":164,"title":"银河航天与香港应科院验证自动驾驶系统","subtitle":"银河航天与香港应科院验证自动驾驶系统","type":3,"digest":"2025年4月，银河航天与香港应用科技研究院（以下简称应科院）的智慧出行团队，在香港首次应用低轨卫星互联网成功验证网联自动驾驶系统。此次试验依托银河航天自研低轨宽带通信卫星组建的“小蜘蛛网”星座，进行自动驾驶相关数据传输以及导航信息接收与执行。试验探索了未来在无地面网络覆盖情况下，利用低轨卫星持续提供智能网联服务的可行性。","pic":"/product/202507/31/ca8e4594-3b02-4548-974b-d029b7594610.jpg","homepic":null,"sort":904,"creator":"123","online":1,"onhome":1,"isDelete":0,"createdTime":"2025-07-30T17:08:55","modifyTime":"2025-07-30T17:08:55","createdTimeStr":"2025-07-30 17:08:55","productIntroduceChildsList":null},{"id":61,"title":"无地面网络区域宽带通信","subtitle":"无地面网络区域宽带通信","type":3,"digest":"面向偏远地区、航空航海以及应急通信等场景下用户对宽带通信的需求，利用银河航天“小蜘蛛网”低轨通信试验系统和高轨高通量卫星通信系统，采用轻小型高低轨多模卫星通信终端，快速部署区域覆盖网络系统，为用户提供7×24小时宽带通信服务，可支持视频、图像、语音、数据及短报文等类型传输业务。\r\n该系统采用“小蜘蛛网”低轨通信试验系统可在规划时段（30min时长）内提供高达百兆每秒的大容量数据传输和低时延宽带通信服务，采用SD-WAN技术实现用户业务流量在高低轨链路间的智能分配，进行卫星通信资源的灵活调度，满足用户实时通信、大容量数据回传等不同业务的用网需求，提供高质量、低成本的用户体验。\r\n","pic":"/product/202507/31/9c06d202-90aa-4074-88a8-b0e0221aaf5b.jpg","homepic":"/product/202301/04/de606ff9-3308-4483-99fa-f09cf86c2aa7.jpg","sort":900,"creator":"123","online":1,"onhome":1,"isDelete":0,"createdTime":"2022-10-17T09:57:11","modifyTime":"2022-10-17T09:57:11","createdTimeStr":"2022-10-17 09:57:11","productIntroduceChildsList":null},{"id":62,"title":"低轨卫星互联网+5G专网","subtitle":"低轨卫星互联网+5G专网","type":3,"digest":"面向工业互联、数据采集以及应急通信等场景下用户对区域大容量通信和远程数据传输的需求，利用银河航天“小蜘蛛网”低轨通信试验系统与地面灵巧5G专网系统，精准部署偏远场区的5G工业互联网，为用户提供区域高速率、低时延通信，实现偏远场区与集团数据中心的周期性大流量数据同步，支持视频、图像、语音、数据及短报文等类型传输业务。\r\n该系统采用灵巧5G专网设备实现偏远场区内局域网络的快速部署，支持智能手机或CPE等通用设备直接接入，降低偏远厂区工业互联网部署成本。通过“小蜘蛛网”低轨通 射","digest":"北京时间2020年1月16日11时02分，我国首颗通信总容量达48Gbps的低轨宽带通信卫星——银河航天首发星在酒泉卫星发射中心成功发射，在国际上第一次验证了Q/V/Ka频段通信。"},"79":{"title":"银河航天承担研制的卫星互联网技术试验卫星发射成功","digest":"2024年11月30日，我国首个商业航天发射场海南商业航天发射场首次发射取得圆满成功。新型运载火箭长征十二号成功将卫星互联网技术试验卫星送入预定轨道。卫星互联网技术试验星由银河航天承担研制。"},"2584":{"title":"银河航天承担研制的卫星互联网低轨07组卫星成功发射","digest":"北京时间2025年8月4日18时21分，我国在海南商业航天发射场使用长征十二号运载火箭，成功将卫星互联网低轨07组卫星发射升空，卫星顺利进入预定轨道，发射任务获得圆满成功。本次发射的一组卫星，均由银河航天承担研制，这是民营商业航天公司首次批量研制此类卫星。"},"25916":{"title":"银河航天承担研制的卫星互联网技术试验卫星成功发射","digest":"北京时间2025年9月16日9时6分，我国在酒泉卫星发射中心，成功将卫星互联网技术试验卫星发射升空，卫星顺利进入预定轨道，发射任务获得圆满成功。本次任务中的一颗卫星互联网技术试验卫星，由商业航天公司银河航天承担研制。"},"26119":{"title":"银河航天承担研制的卫星互联网低轨19组卫星成功发射","digest":"北京时间2026年1月19日15时48分，我国在海南商业航天发射场使用长征十二号运载火箭，成功将卫星互联网低轨19组卫星发射升空，卫星顺利进入预定轨道，发射任务获得圆满成功。该组卫星是银河航天持续独立承担此类太空基础设施建设研制的第二组卫星。"},"260424":{"title":"银河航天承担研制的卫星互联网技术试验卫星成功发射","digest":"北京时间2026年4月24日14时35分，我国在西昌卫星发射中心使用长征二号丁运载火箭，成功将卫星互联网技术试验卫星发射升空，卫星顺利进入预定轨道，发射任务取得圆满成功。该卫星主要用于开展手机宽带直连卫星、天地网络融合等技术试验验证。本次任务中的一颗卫星，由银河航天承担研制，银河航天持续助力太空基础设施建设。"},"260611":{"title":"银河航天承担研制的手机直连卫星成功发射","digest":"北京时间2026年6月9日16时23分，银河航天承担研制的中国移动02星成功发射，任务取得圆满成功。这颗卫星将用于开展手机直连卫星、天地网络融合等技术试验验证。银河航天持续助力太空新基建。"}},"address":"地址","applications":{"title":"卫星互联网应用","more":"了解更多"},"devices":{"title":"单机与部件","more":"了解更多"},"newsCenter":{"title":"新闻中心","more":"了解更多"},"honor":{"title":"荣誉奖项","more":"了解更多"},"satelliteSeries":{"title":"卫星系列","more":"查看更多"},"partners":{"title":"合作伙伴","more":"了解更多"}},"footer":{"companyName":"银河航天","address":"地\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;址：北京市经济技术开发区信创园一期5号楼9-11层","phone":"电\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;话：(+86) 010-62957077","fax":"传\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;真：(+86) 010-82731600","businessCooperation":"商务合作：(+86) 010-68428330","businessEmail":"\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0 aragraph7":""},"ceo":{"name":"徐 鸣","title":"连续创业者，银河航天创始人、董事长兼CEO","education":"毕业于哈尔滨工业大学","positions":{"1":"北京市政协委员","2":"北京市工商联执委","3":"北京市海淀区工商联副主席","4":"中国测绘学会对地观测工作委员会副主任委员","5":"北京市科技进步一等奖"}}},"rdc":{"summary":"为了满足卫星低成本批量制造的需要，银河航天在全国布局了2个整星和3个单机研制基地，按照\"单星研制先行验证，批产模式迭代优化\"推进低成本批产能力建设。","centers":{"beijing":{"title":"北京研发中心","address":"北京市经济技术开发区信创园一期5号楼9-11层","intro":"银河航天北京研发中心，致力于通过敏捷开发、快速迭代模式，规模化研制低成本、高性能的低轨宽带通信卫星平台研发，已逐步形成较为完善的卫星平台型谱，包括可堆叠平板卫星平台 、200-700kg级通信卫星平台、100-500kg遥感卫星平台、10-50kg灵巧型卫星平台等，可全面满足卫星宽带通信、光学遥感、SAR、导航增强、频谱感知等不同领域的应用需求。"},"xian":{"title":"西安研发中心","address":"陕西省西安市国家民用航天产业基地东长安街420号陕铁大厦10层","intro":"银河航天西安研发中心，致力于通信卫星载荷及毫米波产品的研发，主要负责卫星有效载荷、星载天线的研制、批量化生产。研发中心配套产线建设有十万级净化区、暗室测试区、热真空测试区、能源动力区、库房等区域，拥有先进的载荷AIT（总装、集成和测试）设备，各项生产技术水平在国内民营航天企业中处于领先水平。"},"chengdu":{"title":"成都研发中心","address":"四川省成都市高新区天勤路277号","intro":"银河航天成都研发中心，致力于毫米波微波系统、单机研发，并构建了微波产品、系统批量生产线。微波系统覆盖通信、遥控、遥测系统，微波雷达系统，可提供毫米波相控阵通信终端、毫米波相控阵天线、微波模块等产品，产品频率覆盖达到60GHz。研发中心配套产线目前具备12颗低轨宽带通信卫星载荷配套能力，正在建设二期产线5000平米，包括了自动微组装线、手动微组装线、整机集成线、系统联调区、产品环境试验区、微波暗室测试区等，具备年产300套毫米波相控阵终端、100颗低轨宽带通信卫星载荷生产能力。"},"nantong":{"title":"南通盘古工厂","address":"江苏省南通市开发区常兴路20号","intro":"南通盘古工厂是银河航天的卫星智能生产产线，致力于实现卫星总装集成、环境试验、综合测试以及配套单机的高效批产，厂房建筑面积约1.5万平方米，包括整星区约5000平方米、配套单机区约5000平方米及生产辅房约5000平方米。产线建设采用脉动式站位式生产布局，引入了装配机器人、自动化精测系统、数字化制造系统等先进装备，将具备年产百颗卫星的能力。"},"hefei":{"title":"合肥载荷中心","address":"安徽省合肥市高新区中安创谷三期N9栋","intro":"银河航天合肥载荷中心，位于合肥高新区，是国内领先的卫星通信载荷智能制造基地，具备覆盖载荷研发、智能制造、星地一体测试验证的全链条核心技术实力。中心首套通信卫星载荷已成功下线，智能产线正式投产，一期建成后可实现年产50—100颗卫星所需通信载荷的产能。"}}},"address":"地址","products":{"satellite":"卫星系列","devices":"单机与部组件","applications":"卫星互联网应用"},"productDetail":{"backToList":"返回列表"},"newsModal":{"sourceLabel":"来源","prev":"上一篇","next":"下一篇"}}},"__N_SSG":true},"page":"/","query":{},"buildId":"rZFVaIQiJXNLjwTeeqZm0","isFallback":false,"gsp":true,"locale":"zh","locales":["zh","en"],"defaultLocale":"zh","scriptLoader":[]}</script></body></html>
